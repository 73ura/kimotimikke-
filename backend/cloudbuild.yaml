# Cloud Build設定ファイル
steps:
  # Dockerイメージをビルド
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/teamb-backend:$COMMIT_SHA", "."]
    dir: "backend"

  # Container Registryにプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/teamb-backend:$COMMIT_SHA"]

  # Cloud Runにデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "teamb-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/teamb-backend:$COMMIT_SHA"
      - "--region"
      - "asia-northeast1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "300"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"

options:
  logging: CLOUD_LOGGING_ONLY
